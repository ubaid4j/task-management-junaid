
databaseChangeLog:
  - changeSet:
      id: 011-add-team-id-to-team-members
      author: Junaid

      changes:
        - addColumn:
            tableName: team_members
            columns:
              - column:
                  name: team_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: team_members
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id
            constraintName: fk_team_members_team
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: team_members
            columnNames: team_id, user_id
            constraintName: uk_team_user_unique