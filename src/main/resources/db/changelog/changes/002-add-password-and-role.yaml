databaseChangeLog:
  - changeSet:
      id: 002-add-password-and-role
      author: Junaid

      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false