databaseChangeLog:
  - changeSet:
      id: 005-add-uuid-and-time-columns
      author: Junaid

      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true