databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: Junaid

      changes:
        - createTable:
            tableName: users

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(255)