databaseChangeLog:
  - changeSet:
      id: 007-create-tasks-table
      author: Junaid

      changes:
        - createTable:
            tableName: tasks

            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: title
                  type: VARCHAR(255)

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: status
                  type: VARCHAR(30)

              - column:
                  name: created_by
                  type: BIGINT

              - column:
                  name: assigned_to
                  type: BIGINT

              - column:
                  name: due_date
                  type: DATE

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tasks_creator
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: assigned_to
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tasks_assignee
            onDelete: SET NULL